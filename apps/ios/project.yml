name: Klawty
options:
  bundleIdPrefix: ai.klawty
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  KlawtyKit:
    path: ../shared/KlawtyKit
  Swabble:
    path: ../../Swabble

schemes:
  Klawty:
    shared: true
    build:
      targets:
        Klawty: all
    test:
      targets:
        - KlawtyTests
        - KlawtyLogicTests
  KlawtyLogicTests:
    shared: true
    build:
      targets:
        KlawtyLogicTests: all
    test:
      targets:
        - KlawtyLogicTests

targets:
  Klawty:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: KlawtyShareExtension
        embed: true
      - target: KlawtyActivityWidget
        embed: true
      - target: KlawtyWatchApp
      - package: KlawtyKit
      - package: KlawtyKit
        product: KlawtyChatUI
      - package: KlawtyKit
        product: KlawtyProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Klawty.entitlements
        CODE_SIGN_STYLE: "$(KLAWTY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KLAWTY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(KLAWTY_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(KLAWTY_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          KLAWTY_PUSH_TRANSPORT: direct
          KLAWTY_PUSH_DISTRIBUTION: local
          KLAWTY_PUSH_RELAY_BASE_URL: ""
          KLAWTY_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          KLAWTY_PUSH_TRANSPORT: direct
          KLAWTY_PUSH_DISTRIBUTION: local
          KLAWTY_PUSH_RELAY_BASE_URL: ""
          KLAWTY_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Klawty
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.klawty.ios
            CFBundleURLSchemes:
              - klawty
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.klawty.ios.bgrefresh
        NSLocalNetworkUsageDescription: Klawty discovers and connects to your Klawty gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _klawty-gw._tcp
        NSCameraUsageDescription: Klawty can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Klawty uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Klawty can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Klawty needs microphone access for voice wake.
        NSMotionUsageDescription: Klawty may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Klawty needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Klawty uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        KlawtyPushTransport: "$(KLAWTY_PUSH_TRANSPORT)"
        KlawtyPushDistribution: "$(KLAWTY_PUSH_DISTRIBUTION)"
        KlawtyPushRelayBaseURL: "$(KLAWTY_PUSH_RELAY_BASE_URL)"
        KlawtyPushAPNsEnvironment: "$(KLAWTY_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  KlawtyShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: KlawtyKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KLAWTY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KLAWTY_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(KLAWTY_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(KLAWTY_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Klawty Share
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  KlawtyActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/KlawtyActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KLAWTY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KLAWTY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(KLAWTY_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Klawty Activity
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  KlawtyWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: KlawtyWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(KLAWTY_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Klawty
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(KLAWTY_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  KlawtyWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(KLAWTY_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Klawty
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(KLAWTY_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  KlawtyTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Klawty
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KLAWTY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KLAWTY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.klawty.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Klawty.app/Klawty"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: KlawtyTests
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"

  KlawtyLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: KlawtyKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KLAWTY_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KLAWTY_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.klawty.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: KlawtyLogicTests
        CFBundleShortVersionString: "$(KLAWTY_MARKETING_VERSION)"
        CFBundleVersion: "$(KLAWTY_BUILD_VERSION)"

services:
  klawty-gateway:
    image: ${KLAWTY_IMAGE:-klawty:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      KLAWTY_GATEWAY_TOKEN: ${KLAWTY_GATEWAY_TOKEN:-}
      KLAWTY_ALLOW_INSECURE_PRIVATE_WS: ${KLAWTY_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${KLAWTY_TZ:-UTC}
    volumes:
      - ${KLAWTY_CONFIG_DIR}:/home/node/.klawty
      - ${KLAWTY_WORKSPACE_DIR}:/home/node/.klawty/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg KLAWTY_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with KLAWTY_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${KLAWTY_GATEWAY_PORT:-2508}:2508"
      - "${KLAWTY_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${KLAWTY_GATEWAY_BIND:-lan}",
        "--port",
        "2508",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:2508/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  klawty-cli:
    image: ${KLAWTY_IMAGE:-klawty:local}
    network_mode: "service:klawty-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      KLAWTY_GATEWAY_TOKEN: ${KLAWTY_GATEWAY_TOKEN:-}
      KLAWTY_ALLOW_INSECURE_PRIVATE_WS: ${KLAWTY_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${KLAWTY_TZ:-UTC}
    volumes:
      - ${KLAWTY_CONFIG_DIR}:/home/node/.klawty
      - ${KLAWTY_WORKSPACE_DIR}:/home/node/.klawty/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - klawty-gateway

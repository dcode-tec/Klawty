services:
  - type: web
    name: klawty
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: KLAWTY_STATE_DIR
        value: /data/.klawty
      - key: KLAWTY_WORKSPACE_DIR
        value: /data/workspace
      - key: KLAWTY_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: klawty-data
      mountPath: /data
      sizeGB: 1

apiVersion: v1
kind: ConfigMap
metadata:
  name: klawty-config
  labels:
    app: klawty
data:
  klawty.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "loopback",
        "port": 2508,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.klawty/workspace"
        },
        "list": [
          {
            "id": "default",
            "name": "Klawty Assistant",
            "workspace": "~/.klawty/workspace"
          }
        ]
      },
      "cron": { "enabled": false }
    }
  AGENTS.md: |
    # Klawty Assistant

    You are a helpful AI assistant running in Kubernetes.
